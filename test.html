<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProKOT - Full Restaurant POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --occupied: #ef4444;
            --empty: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }

        .category-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 12px -3px rgba(99, 102, 241, 0.3);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .veg-indicator { width: 12px; height: 12px; border: 1px solid #10b981; padding: 2px; display: flex; justify-content: center; align-items: center; }
        .veg-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; }
        .nonveg-indicator { width: 12px; height: 12px; border: 1px solid #ef4444; padding: 2px; display: flex; justify-content: center; align-items: center; }
        .nonveg-dot { width: 0; height: 0; border-left: 3px solid transparent; border-right: 3px solid transparent; border-bottom: 5px solid #ef4444; }
    </style>
</head>
<body class="selection:bg-indigo-100">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button id="back-btn" onclick="goToTables()" class="hidden w-10 h-10 rounded-xl bg-slate-100 text-slate-600 flex items-center justify-center active:scale-90 transition-all">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div id="brand-logo" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-100">
                    <i class="fas fa-bolt text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-800 tracking-tight">ProKOT <span class="text-indigo-600">POS</span></h1>
                    <p id="header-status" class="text-[10px] uppercase font-bold text-slate-400">Tables Dashboard</p>
                </div>
            </div>
        </div>
    </header>

    <!-- NAVIGATION TABS (Bottom) -->
    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-100 flex justify-around py-3 z-50">
        <button onclick="switchMainTab('tables')" class="nav-btn flex flex-col items-center gap-1 text-indigo-600" id="nav-tables">
            <i class="fas fa-th-large text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Tables</span>
        </button>
        <button onclick="switchMainTab('reports')" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-reports">
            <i class="fas fa-chart-line text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Reports</span>
        </button>
    </nav>

    <!-- STEP 1: TABLE GRID -->
    <main id="view-tables" class="px-5 py-6 mb-24 animate-fade-in">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-2xl font-800 text-slate-900 tracking-tight">Table Layout</h2>
                <p class="text-sm text-slate-500 font-medium">Red = Running KOT, Green = Free</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4" id="table-grid">
            <!-- Tables generated by JS -->
        </div>
    </main>

    <!-- STEP 2: ORDERING MENU -->
    <main id="view-menu" class="hidden px-5 py-6 mb-32 animate-fade-in">
        <div class="bg-slate-900 rounded-[2rem] p-6 mb-8 text-white shadow-xl flex flex-col gap-4">
            <div class="flex justify-between items-start">
                <div>
                    <span class="text-[10px] font-black uppercase tracking-widest text-indigo-400">Order For</span>
                    <h3 id="display-selected-table" class="text-3xl font-800">Table 01</h3>
                    <p id="running-kot-count" class="text-xs text-white/50 font-medium mt-1">0 KOTs currently running</p>
                </div>
                <div id="table-status-pill" class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter bg-emerald-500">Free</div>
            </div>
            <div class="relative">
                <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-sm"></i>
                <input type="text" id="customer-name" placeholder="Customer Name (Optional)" class="w-full bg-white/10 border border-white/10 rounded-2xl pl-10 pr-4 py-3 text-sm font-bold placeholder:text-white/30 focus:bg-white/20 transition-all outline-none">
            </div>
        </div>

        <!-- Menu Tabs -->
        <div class="space-y-5 mb-8">
            <div class="relative group">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="menu-search" oninput="renderMenu()" placeholder="Search dishes..." class="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl focus:ring-4 focus:ring-indigo-50/50 shadow-sm transition-all text-sm font-medium">
            </div>

            <div class="flex overflow-x-auto gap-3 py-1 no-scrollbar">
                <button onclick="filterMenu('All')" class="category-tab active px-6 py-2.5 rounded-2xl whitespace-nowrap text-sm font-bold bg-white text-slate-500 transition-all card-shadow">All Items</button>
                <button onclick="filterMenu('Starters')" class="category-tab px-6 py-2.5 rounded-2xl whitespace-nowrap text-sm font-bold bg-white text-slate-500 transition-all card-shadow">Starters</button>
                <button onclick="filterMenu('Main Course')" class="category-tab px-6 py-2.5 rounded-2xl whitespace-nowrap text-sm font-bold bg-white text-slate-500 transition-all card-shadow">Mains</button>
                <button onclick="filterMenu('Breads')" class="category-tab px-6 py-2.5 rounded-2xl whitespace-nowrap text-sm font-bold bg-white text-slate-500 transition-all card-shadow">Breads</button>
                <button onclick="filterMenu('Drinks')" class="category-tab px-6 py-2.5 rounded-2xl whitespace-nowrap text-sm font-bold bg-white text-slate-500 transition-all card-shadow">Drinks</button>
            </div>
        </div>

        <div id="menu-grid" class="grid grid-cols-1 gap-4">
            <!-- Items injected by JS -->
        </div>
    </main>

    <!-- STEP 3: SALES REPORTS -->
    <main id="view-reports" class="hidden px-5 py-6 mb-24 animate-fade-in">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-800 text-slate-900 tracking-tight">Daily Sales</h2>
                <p id="total-sales-today" class="text-sm text-indigo-600 font-extrabold">Total: ₹0</p>
            </div>
            <button onclick="clearAllData()" class="text-[10px] font-black text-rose-500 bg-rose-50 px-3 py-2 rounded-lg">RESET POS</button>
        </div>
        
        <div id="sales-list" class="space-y-4">
            <!-- Sales Cards -->
        </div>
    </main>

    <!-- Cart Bar (KOT Context) -->
    <div id="bottom-cart-bar" class="hidden fixed bottom-20 left-0 right-0 p-6 z-50">
        <div class="max-w-md mx-auto flex flex-col gap-3">
            <!-- Show Bill Option if Table is Occupied -->
            <button id="bill-btn" onclick="openBillSummary()" class="hidden w-full bg-indigo-600 text-white p-4 rounded-2xl flex items-center justify-center font-bold shadow-lg shadow-indigo-200">
                <i class="fas fa-file-invoice-dollar mr-2"></i> GENERATE FINAL BILL
            </button>
            
            <button onclick="toggleOrderSummary()" class="w-full bg-slate-900 text-white p-4 rounded-[2rem] flex items-center justify-between shadow-2xl active:scale-95 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center text-xl shadow-lg">
                        <i class="fas fa-shopping-basket"></i>
                    </div>
                    <div class="text-left">
                        <p id="cart-item-count" class="text-[10px] font-bold uppercase tracking-widest text-indigo-400">0 Items</p>
                        <p id="cart-total-display" class="text-lg font-bold">New KOT Draft</p>
                    </div>
                </div>
                <div class="bg-white/10 px-4 py-2 rounded-full flex items-center gap-2">
                    <span class="text-xs font-black">SEND KOT</span>
                    <i class="fas fa-chevron-right text-[10px]"></i>
                </div>
            </button>
        </div>
    </div>

    <!-- Modals -->
    <div id="summary-modal" class="hidden fixed inset-0 z-[60]">
        <div onclick="closeModals()" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div id="summary-content" class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[3rem] p-8 transition-transform duration-300 translate-y-full shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="w-16 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            
            <div id="modal-body">
                <!-- Content Dynamically Injected: Either KOT Summary or Bill Summary -->
            </div>
        </div>
    </div>

    <script>
        // --- POS DATA & CONFIG ---
        const WHATSAPP_NUMBER = "919910109626";
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'pro-pos-v4';

        const menuData = [
            { id: 1, name: "Paneer Tikka", price: 210, category: "Starters", isVeg: true },
            { id: 2, name: "Chicken Malai Tikka", price: 280, category: "Starters", isVeg: false },
            { id: 3, name: "Paneer Butter Masala", price: 240, category: "Main Course", isVeg: true },
            { id: 4, name: "Dal Makhani", price: 210, category: "Main Course", isVeg: true },
            { id: 5, name: "Chicken Curry", price: 350, category: "Main Course", isVeg: false },
            { id: 6, name: "Butter Naan", price: 40, category: "Breads", isVeg: true },
            { id: 7, name: "Tandoori Roti", price: 15, category: "Breads", isVeg: true },
            { id: 8, name: "Cold Drink 600ml", price: 50, category: "Drinks", isVeg: true },
            { id: 9, name: "Mineral Water", price: 20, category: "Drinks", isVeg: true }
        ];

        // --- STATE MANAGEMENT ---
        // tableOrders[tableId] = [{kotId, items: []}, ...]
        let tableOrders = JSON.parse(localStorage.getItem(`${APP_ID}_tableOrders`) || "{}");
        let salesReport = JSON.parse(localStorage.getItem(`${APP_ID}_salesReport`) || "[]");
        
        let selectedTableId = null;
        let currentCart = {}; // Temporary cart for current KOT being drafted
        let activeCategory = 'All';

        // --- INITIALIZATION ---
        function init() {
            renderTables();
            updateReportTotals();
        }

        // --- NAVIGATION ---
        function switchMainTab(tab) {
            document.getElementById('view-tables').classList.toggle('hidden', tab !== 'tables');
            document.getElementById('view-reports').classList.toggle('hidden', tab !== 'reports');
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            
            document.getElementById('nav-tables').classList.toggle('text-indigo-600', tab === 'tables');
            document.getElementById('nav-tables').classList.toggle('text-slate-400', tab !== 'tables');
            document.getElementById('nav-reports').classList.toggle('text-indigo-600', tab === 'reports');
            document.getElementById('nav-reports').classList.toggle('text-slate-400', tab !== 'reports');

            if(tab === 'reports') renderReports();
            if(tab === 'tables') renderTables();
        }

        function goToTables() {
            switchMainTab('tables');
            selectedTableId = null;
            currentCart = {};
            updateCartDisplay();
        }

        // --- TABLE GRID ---
        function renderTables() {
            const grid = document.getElementById('table-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const tableId = `Table ${i}`;
                const isOccupied = tableOrders[tableId] && tableOrders[tableId].length > 0;
                
                const div = document.createElement('div');
                div.onclick = () => selectTable(tableId);
                div.className = `p-5 rounded-3xl border ${isOccupied ? 'border-rose-100 bg-rose-50' : 'border-slate-100 bg-white'} card-shadow flex flex-col items-center gap-2 active:scale-95 transition-all`;
                div.innerHTML = `
                    <div class="w-12 h-12 ${isOccupied ? 'bg-rose-500 text-white' : 'bg-indigo-50 text-indigo-600'} rounded-full flex items-center justify-center text-lg font-black">
                        ${i.toString().padStart(2, '0')}
                    </div>
                    <span class="text-[9px] font-black uppercase tracking-widest ${isOccupied ? 'text-rose-400' : 'text-slate-400'}">${isOccupied ? 'Occupied' : 'Free'}</span>
                `;
                grid.appendChild(div);
            }
        }

        function selectTable(tableId) {
            selectedTableId = tableId;
            document.getElementById('view-tables').classList.add('hidden');
            document.getElementById('view-menu').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            
            document.getElementById('display-selected-table').innerText = tableId;
            const isOccupied = tableOrders[tableId] && tableOrders[tableId].length > 0;
            const statusPill = document.getElementById('table-status-pill');
            statusPill.innerText = isOccupied ? 'Occupied' : 'Free';
            statusPill.className = `px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${isOccupied ? 'bg-rose-500' : 'bg-emerald-500'}`;
            
            document.getElementById('running-kot-count').innerText = isOccupied ? `${tableOrders[tableId].length} KOTs currently running` : 'No running orders';
            document.getElementById('bill-btn').classList.toggle('hidden', !isOccupied);
            
            renderMenu();
            updateCartDisplay();
        }

        // --- MENU LOGIC ---
        function filterMenu(category) {
            activeCategory = category;
            document.querySelectorAll('.category-tab').forEach(btn => btn.classList.toggle('active', btn.innerText.includes(category)));
            renderMenu();
        }

        function renderMenu() {
            const container = document.getElementById('menu-grid');
            const search = document.getElementById('menu-search').value.toLowerCase();
            container.innerHTML = '';

            const filtered = menuData.filter(item => (activeCategory === 'All' || item.category === activeCategory) && item.name.toLowerCase().includes(search));

            filtered.forEach(item => {
                const qty = currentCart[item.id]?.qty || 0;
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl border border-slate-100 card-shadow flex items-center justify-between";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <div class="${item.isVeg ? 'veg-indicator' : 'nonveg-indicator'} bg-white absolute -top-1 -left-1 rounded-sm shadow-sm"><div class="${item.isVeg ? 'veg-dot' : 'nonveg-dot'}"></div></div>
                            <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center font-black text-slate-300">${item.name.charAt(0)}</div>
                        </div>
                        <div>
                            <h4 class="font-800 text-slate-800 leading-tight">${item.name}</h4>
                            <p class="text-[10px] text-indigo-500 font-extrabold mt-1">₹${item.price}</p>
                        </div>
                    </div>
                    <div class="flex flex-col items-center bg-slate-50 rounded-2xl p-1 border border-slate-100">
                        <button onclick="updateQty(${item.id}, 1)" class="w-10 h-10 bg-white rounded-xl text-indigo-600 shadow-sm active:scale-110 transition-transform"><i class="fas fa-plus text-xs"></i></button>
                        <span id="qty-${item.id}" class="h-8 flex items-center justify-center font-bold text-slate-700">${qty}</span>
                        <button onclick="updateQty(${item.id}, -1)" class="w-10 h-10 text-slate-300 active:text-rose-500"><i class="fas fa-minus text-xs"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateQty(id, delta) {
            const item = menuData.find(m => m.id === id);
            if (!currentCart[id] && delta > 0) currentCart[id] = { ...item, qty: 1 };
            else if (currentCart[id]) {
                currentCart[id].qty += delta;
                if (currentCart[id].qty <= 0) delete currentCart[id];
            }
            const label = document.getElementById(`qty-${id}`);
            if (label) label.innerText = currentCart[id]?.qty || 0;
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const items = Object.values(currentCart);
            const count = items.reduce((a, b) => a + b.qty, 0);
            const bar = document.getElementById('bottom-cart-bar');
            
            // Show bar if there's a draft KOT OR if table has existing orders (to show Bill button)
            const hasRunningOrders = tableOrders[selectedTableId] && tableOrders[selectedTableId].length > 0;
            
            if (count > 0 || hasRunningOrders) {
                bar.classList.remove('hidden');
                document.getElementById('cart-item-count').innerText = `${count} New Items`;
                document.getElementById('cart-total-display').innerText = count > 0 ? "KOT Draft Ready" : "Table Running";
            } else {
                bar.classList.add('hidden');
            }
        }

        // --- KOT & BILL SUMMARIES ---
        function toggleOrderSummary() {
            const items = Object.values(currentCart);
            if(items.length === 0) return;

            const modal = document.getElementById('summary-modal');
            const body = document.getElementById('modal-body');
            const cust = document.getElementById('customer-name').value || 'Guest';

            body.innerHTML = `
                <div class="mb-8">
                    <h3 class="text-2xl font-800 text-slate-900">Confirm KOT</h3>
                    <p class="text-sm font-medium text-slate-500">${selectedTableId} • ${cust}</p>
                </div>
                <div class="space-y-3 mb-8">
                    ${items.map(i => `
                        <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                            <span class="font-bold text-slate-700">${i.name}</span>
                            <span class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-xs font-black">x${i.qty}</span>
                        </div>
                    `).join('')}
                </div>
                <button onclick="sendKOT()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-800 text-xl flex items-center justify-center gap-3">
                    <i class="fab fa-whatsapp"></i> SEND TO KITCHEN
                </button>
            `;

            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('summary-content').classList.remove('translate-y-full'), 10);
        }

        function openBillSummary() {
            const modal = document.getElementById('summary-modal');
            const body = document.getElementById('modal-body');
            const kots = tableOrders[selectedTableId];
            
            // Consolidate all items from all KOTs
            const finalItems = {};
            kots.forEach(k => {
                k.items.forEach(i => {
                    if(finalItems[i.id]) finalItems[i.id].qty += i.qty;
                    else finalItems[i.id] = {...i};
                });
            });

            const itemsArr = Object.values(finalItems);
            const total = itemsArr.reduce((a, b) => a + (b.qty * b.price), 0);

            body.innerHTML = `
                <div class="mb-8">
                    <h3 class="text-3xl font-800 text-indigo-600">Final Bill</h3>
                    <p class="text-sm font-medium text-slate-500">${selectedTableId} • ${kots.length} KOTs Total</p>
                </div>
                <div class="space-y-2 mb-8 border-y border-slate-100 py-4">
                    ${itemsArr.map(i => `
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-600 font-medium">${i.name} <span class="text-[10px] text-slate-400">x${i.qty}</span></span>
                            <span class="font-bold text-slate-800">₹${i.qty * i.price}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="flex justify-between items-center mb-8 px-2">
                    <span class="text-xs font-black uppercase text-slate-400">Grand Total</span>
                    <span class="text-3xl font-black text-slate-900">₹${total}</span>
                </div>
                <div class="flex flex-col gap-3">
                    <button onclick="finalizeBill(${total}, ${JSON.stringify(itemsArr).replace(/"/g, '&quot;')})" class="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-800 text-xl shadow-xl shadow-emerald-100">
                        PAID & CLEAR TABLE
                    </button>
                    <button onclick="closeModals()" class="w-full text-slate-400 font-bold py-2">Go Back</button>
                </div>
            `;

            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('summary-content').classList.remove('translate-y-full'), 10);
        }

        // --- TRANSACTIONS ---
        function sendKOT() {
            const cust = document.getElementById('customer-name').value || 'Guest';
            const items = Object.values(currentCart);
            const now = new Date();
            const kotId = `KOT-${now.getTime().toString().slice(-4)}`;

            // Add to table running orders
            if(!tableOrders[selectedTableId]) tableOrders[selectedTableId] = [];
            tableOrders[selectedTableId].push({ kotId, items, time: now.toLocaleTimeString() });
            localStorage.setItem(`${APP_ID}_tableOrders`, JSON.stringify(tableOrders));

            // WhatsApp formatting
            let msg = `*NEW KOT: ${kotId}*\n*TABLE:* ${selectedTableId}\n*CUST:* ${cust}\n------------------\n`;
            items.forEach(i => msg += `• ${i.name} x ${i.qty}\n`);
            msg += `------------------\n*TIME:* ${now.toLocaleTimeString()}`;

            currentCart = {};
            closeModals();
            selectTable(selectedTableId); // Refresh table view

            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function finalizeBill(total, items) {
            const now = new Date();
            const billId = `BILL-${now.getFullYear()}${now.getMonth()+1}${now.getDate()}-${salesReport.length + 1}`;
            
            const sale = {
                billId,
                table: selectedTableId,
                total,
                items,
                time: now.toLocaleString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true })
            };

            salesReport.unshift(sale);
            localStorage.setItem(`${APP_ID}_salesReport`, JSON.stringify(salesReport));

            // Clear table
            delete tableOrders[selectedTableId];
            localStorage.setItem(`${APP_ID}_tableOrders`, JSON.stringify(tableOrders));

            closeModals();
            goToTables();
            updateReportTotals();
            
            // Optional: Bill WhatsApp
            let msg = `*BILL: ${billId}*\n*TABLE:* ${sale.table}\n*TOTAL:* ₹${total}\n------------------\n*Thank You!*`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- REPORTS ---
        function renderReports() {
            const container = document.getElementById('sales-list');
            container.innerHTML = salesReport.length === 0 ? '<div class="py-20 text-center text-slate-300 font-bold">No sales today</div>' : '';

            salesReport.forEach(sale => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2.5rem] border border-slate-100 card-shadow";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[9px] font-black text-indigo-500 uppercase tracking-widest">${sale.billId}</span>
                            <h4 class="text-xl font-800 text-slate-800">${sale.table}</h4>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">${sale.time}</p>
                            <span class="text-lg font-black text-slate-900">₹${sale.total}</span>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl text-[11px] font-bold text-slate-500 flex flex-wrap gap-x-4 gap-y-1">
                        ${sale.items.map(i => `<span>${i.name} (x${i.qty})</span>`).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
            updateReportTotals();
        }

        function updateReportTotals() {
            const total = salesReport.reduce((a, b) => a + b.total, 0);
            const display = document.getElementById('total-sales-today');
            if(display) display.innerText = `Today's Revenue: ₹${total}`;
        }

        // --- UTILS ---
        function closeModals() {
            const content = document.getElementById('summary-content');
            content.classList.add('translate-y-full');
            setTimeout(() => document.getElementById('summary-modal').classList.add('hidden'), 300);
        }

        function clearAllData() {
            if(confirm("Are you sure? This will delete all running orders and sales reports!")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
