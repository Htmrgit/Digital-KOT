<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProKOT - Pro Restaurant POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --secondary: #475569;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        /* Side Navigation Drawer */
        #side-drawer {
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #side-drawer.open {
            transform: translateX(0);
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .category-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 12px -3px rgba(99, 102, 241, 0.3);
        }

        /* Print Styling */
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { 
                position: absolute; 
                left: 0; top: 0; width: 80mm; 
                font-family: 'Courier New', Courier, monospace;
                font-size: 12px;
                padding: 10px;
            }
            .no-print { display: none !important; }
        }

        .bill-btn-float {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 28px;
            height: 28px;
            background: #ef4444;
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(239, 68, 68, 0.3);
            border: 2px solid white;
            z-index: 10;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="selection:bg-indigo-100">

    <!-- Print View (Hidden in UI) -->
    <div id="print-section" class="hidden"></div>

    <!-- Left Side Drawer (Sidebar) -->
    <div id="side-drawer-overlay" onclick="toggleDrawer()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] hidden"></div>
    <aside id="side-drawer" class="fixed top-0 left-0 bottom-0 w-[280px] bg-white z-[70] shadow-2xl flex flex-col">
        <div class="p-6 border-b border-slate-100 bg-indigo-600 text-white">
            <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center mb-4 text-2xl">
                <i class="fas fa-bolt"></i>
            </div>
            <h2 class="text-xl font-800">ProKOT POS</h2>
            <p class="text-[10px] uppercase font-bold opacity-60">Store Admin Panel</p>
        </div>
        <nav class="p-4 space-y-2 flex-1">
            <button onclick="switchMainTab('tables'); toggleDrawer()" class="w-full flex items-center gap-4 p-4 rounded-2xl text-slate-600 hover:bg-slate-50 font-bold transition-all">
                <i class="fas fa-th-large"></i> Tables Dashboard
            </button>
            <button onclick="switchMainTab('reports'); toggleDrawer()" class="w-full flex items-center gap-4 p-4 rounded-2xl text-slate-600 hover:bg-slate-50 font-bold transition-all">
                <i class="fas fa-chart-line"></i> Sales Reports
            </button>
            <button class="w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold">
                <i class="fas fa-utensils"></i> Menu Manager <span class="text-[8px] bg-slate-100 px-2 py-1 rounded text-slate-400">SOON</span>
            </button>
            <button class="w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold">
                <i class="fas fa-cog"></i> Settings
            </button>
        </nav>
        <div class="p-6 border-t border-slate-100">
            <button onclick="clearAllData()" class="w-full py-3 bg-rose-50 text-rose-500 rounded-xl font-bold text-sm">
                <i class="fas fa-power-off mr-2"></i> Reset Store
            </button>
        </div>
    </aside>

    <!-- App Header -->
    <header class="sticky top-0 z-50 glass px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button onclick="toggleDrawer()" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-600 flex items-center justify-center active:scale-90 transition-all">
                <i class="fas fa-bars-staggered"></i>
            </button>
            <div>
                <h1 id="page-title" class="text-lg font-800 tracking-tight">Tables</h1>
                <p id="header-status" class="text-[10px] uppercase font-bold text-slate-400">Dashboard</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button id="back-btn" onclick="goToTables()" class="hidden w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center active:scale-90 transition-all">
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>
    </header>

    <!-- STEP 1: TABLE GRID -->
    <main id="view-tables" class="px-5 py-6 mb-24 animate-fade-in">
        <div class="grid grid-cols-3 gap-6" id="table-grid">
            <!-- Tables generated by JS -->
        </div>
    </main>

    <!-- STEP 2: ORDERING MENU -->
    <main id="view-menu" class="hidden px-5 py-6 mb-32 animate-fade-in">
        <!-- Table Status Header -->
        <div class="bg-slate-900 rounded-[2rem] p-6 mb-6 text-white shadow-xl flex flex-col gap-4">
            <div class="flex justify-between items-start">
                <div>
                    <span class="text-[10px] font-black uppercase tracking-widest text-indigo-400">Ordering At</span>
                    <h3 id="display-selected-table" class="text-3xl font-800">Table 01</h3>
                </div>
                <div id="table-status-pill" class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter bg-emerald-500">Free</div>
            </div>
            <div class="flex gap-2">
                <input type="text" id="customer-name" placeholder="Name" class="flex-1 bg-white/10 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold focus:bg-white/20 outline-none">
                <input type="tel" id="customer-phone" placeholder="Phone" class="flex-1 bg-white/10 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold focus:bg-white/20 outline-none">
            </div>
        </div>

        <!-- Menu Tabs & Search -->
        <div class="space-y-4 mb-6">
            <div class="relative group">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="menu-search" oninput="renderMenu()" placeholder="Search dishes..." class="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-100 rounded-2xl focus:ring-4 focus:ring-indigo-50/50 shadow-sm transition-all text-sm font-medium">
            </div>
            <div class="flex overflow-x-auto gap-3 py-1 no-scrollbar">
                <button onclick="filterMenu('All')" class="category-tab active px-5 py-2 rounded-xl whitespace-nowrap text-xs font-bold bg-white text-slate-400 transition-all border border-slate-100">All</button>
                <button onclick="filterMenu('Starters')" class="category-tab px-5 py-2 rounded-xl whitespace-nowrap text-xs font-bold bg-white text-slate-400 transition-all border border-slate-100">Starters</button>
                <button onclick="filterMenu('Main Course')" class="category-tab px-5 py-2 rounded-xl whitespace-nowrap text-xs font-bold bg-white text-slate-400 transition-all border border-slate-100">Main</button>
                <button onclick="filterMenu('Breads')" class="category-tab px-5 py-2 rounded-xl whitespace-nowrap text-xs font-bold bg-white text-slate-400 transition-all border border-slate-100">Breads</button>
                <button onclick="filterMenu('Drinks')" class="category-tab px-5 py-2 rounded-xl whitespace-nowrap text-xs font-bold bg-white text-slate-400 transition-all border border-slate-100">Drinks</button>
            </div>
        </div>

        <div id="menu-grid" class="grid grid-cols-1 gap-4">
            <!-- Items injected by JS -->
        </div>
    </main>

    <!-- STEP 3: SALES REPORTS -->
    <main id="view-reports" class="hidden px-5 py-6 mb-24 animate-fade-in">
        <div class="mb-6">
            <h2 class="text-2xl font-800 text-slate-900 tracking-tight">Sales History</h2>
            <p id="total-sales-today" class="text-sm text-indigo-600 font-extrabold">Revenue: ₹0</p>
        </div>
        <div id="sales-list" class="space-y-4"></div>
    </main>

    <!-- Floating Order Bar -->
    <div id="bottom-cart-bar" class="hidden fixed bottom-6 left-6 right-6 z-50 animate-fade-in">
        <div class="max-w-md mx-auto flex flex-col gap-3">
            <button id="bill-btn" onclick="openBillSummary()" class="hidden w-full bg-indigo-600 text-white p-4 rounded-2xl flex items-center justify-center font-bold shadow-xl">
                <i class="fas fa-receipt mr-3"></i> FINAL BILLING
            </button>
            <button onclick="toggleOrderSummary()" class="w-full bg-slate-900 text-white p-4 rounded-[2rem] flex items-center justify-between shadow-2xl active:scale-95 transition-all">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-sm shadow-lg">
                        <i class="fas fa-plus"></i>
                    </div>
                    <div class="text-left">
                        <p id="cart-item-count" class="text-[8px] font-black uppercase tracking-widest text-indigo-400">0 ITEMS DRAFTED</p>
                        <p id="cart-total-display" class="text-md font-bold">Punch KOT</p>
                    </div>
                </div>
                <div class="bg-white/10 px-4 py-2 rounded-full flex items-center gap-2">
                    <span class="text-[10px] font-black uppercase">Next</span>
                    <i class="fas fa-chevron-right text-[8px]"></i>
                </div>
            </button>
        </div>
    </div>

    <!-- Modals -->
    <div id="summary-modal" class="hidden fixed inset-0 z-[80]">
        <div onclick="closeModals()" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div id="summary-content" class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[3rem] p-8 transition-transform duration-300 translate-y-full shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "919910109626";
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'pro-pos-v5';

        const menuData = [
            { id: 1, name: "Paneer Tikka", price: 210, category: "Starters", isVeg: true },
            { id: 2, name: "Chicken Tikka", price: 280, category: "Starters", isVeg: false },
            { id: 3, name: "Paneer Butter Masala", price: 240, category: "Main Course", isVeg: true },
            { id: 4, name: "Dal Makhani", price: 210, category: "Main Course", isVeg: true },
            { id: 5, name: "Chicken Curry", price: 350, category: "Main Course", isVeg: false },
            { id: 6, name: "Butter Naan", price: 40, category: "Breads", isVeg: true },
            { id: 7, name: "Tandoori Roti", price: 15, category: "Breads", isVeg: true },
            { id: 8, name: "Masala Chai", price: 30, category: "Drinks", isVeg: true },
            { id: 9, name: "Cold Coffee", price: 110, category: "Drinks", isVeg: true }
        ];

        let tableOrders = JSON.parse(localStorage.getItem(`${APP_ID}_tableOrders`) || "{}");
        let salesReport = JSON.parse(localStorage.getItem(`${APP_ID}_salesReport`) || "[]");
        let selectedTableId = null;
        let currentCart = {};
        let activeCategory = 'All';

        function init() {
            renderTables();
            updateReportTotals();
        }

        function toggleDrawer() {
            const drawer = document.getElementById('side-drawer');
            const overlay = document.getElementById('side-drawer-overlay');
            const isOpen = drawer.classList.contains('open');
            if(isOpen) {
                drawer.classList.remove('open');
                overlay.classList.add('hidden');
            } else {
                drawer.classList.add('open');
                overlay.classList.remove('hidden');
            }
        }

        function switchMainTab(tab) {
            document.getElementById('view-tables').classList.toggle('hidden', tab !== 'tables');
            document.getElementById('view-reports').classList.toggle('hidden', tab !== 'reports');
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('page-title').innerText = tab === 'tables' ? 'Tables' : 'Reports';
            
            if(tab === 'reports') renderReports();
            if(tab === 'tables') renderTables();
        }

        function goToTables() {
            switchMainTab('tables');
            selectedTableId = null;
            currentCart = {};
            updateCartDisplay();
        }

        function renderTables() {
            const grid = document.getElementById('table-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 15; i++) {
                const tableId = `Table ${i}`;
                const isOccupied = tableOrders[tableId] && tableOrders[tableId].length > 0;
                const div = document.createElement('div');
                div.className = "relative animate-fade-in";
                let billIcon = isOccupied ? `<button onclick="event.stopPropagation(); selectedTableId='${tableId}'; openBillSummary();" class="bill-btn-float"><i class="fas fa-file-invoice-dollar"></i></button>` : '';
                div.innerHTML = `
                    ${billIcon}
                    <div onclick="selectTable('${tableId}')" class="p-5 rounded-3xl border ${isOccupied ? 'border-rose-100 bg-rose-50' : 'border-slate-100 bg-white'} shadow-sm flex flex-col items-center gap-2 active:scale-95 transition-all">
                        <div class="w-12 h-12 ${isOccupied ? 'bg-rose-500 text-white' : 'bg-indigo-50 text-indigo-600'} rounded-full flex items-center justify-center text-lg font-black">
                            ${i.toString().padStart(2, '0')}
                        </div>
                        <span class="text-[8px] font-black uppercase tracking-widest ${isOccupied ? 'text-rose-400' : 'text-slate-400'}">${isOccupied ? 'Occupied' : 'Free'}</span>
                    </div>
                `;
                grid.appendChild(div);
            }
        }

        function selectTable(tableId) {
            selectedTableId = tableId;
            document.getElementById('view-tables').classList.add('hidden');
            document.getElementById('view-menu').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('page-title').innerText = tableId;
            
            const isOccupied = tableOrders[tableId] && tableOrders[tableId].length > 0;
            const statusPill = document.getElementById('table-status-pill');
            statusPill.innerText = isOccupied ? 'Running' : 'Free';
            statusPill.className = `px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${isOccupied ? 'bg-rose-500' : 'bg-emerald-500'}`;
            
            renderMenu();
            updateCartDisplay();
        }

        function filterMenu(category) {
            activeCategory = category;
            document.querySelectorAll('.category-tab').forEach(btn => btn.classList.toggle('active', btn.innerText.includes(category)));
            renderMenu();
        }

        function renderMenu() {
            const container = document.getElementById('menu-grid');
            const search = document.getElementById('menu-search').value.toLowerCase();
            container.innerHTML = '';
            menuData.filter(item => (activeCategory === 'All' || item.category === activeCategory) && item.name.toLowerCase().includes(search)).forEach(item => {
                const qty = currentCart[item.id]?.qty || 0;
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="${item.isVeg ? 'veg-indicator' : 'nonveg-indicator'} rounded-sm shadow-sm"><div class="${item.isVeg ? 'veg-dot' : 'nonveg-dot'}"></div></div>
                        <div>
                            <h4 class="font-800 text-slate-800 text-sm leading-tight">${item.name}</h4>
                            <p class="text-xs font-extrabold text-indigo-500">₹${item.price}</p>
                        </div>
                    </div>
                    <div class="flex items-center bg-slate-50 rounded-xl p-1 border border-slate-100">
                        <button onclick="updateQty(${item.id}, 1)" class="w-8 h-8 bg-white rounded-lg text-indigo-600 shadow-sm"><i class="fas fa-plus text-[10px]"></i></button>
                        <span class="w-8 text-center font-bold text-sm">${qty}</span>
                        <button onclick="updateQty(${item.id}, -1)" class="w-8 h-8 text-slate-300"><i class="fas fa-minus text-[10px]"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateQty(id, delta) {
            if (!currentCart[id] && delta > 0) currentCart[id] = { ...menuData.find(m => m.id === id), qty: 1 };
            else if (currentCart[id]) {
                currentCart[id].qty += delta;
                if (currentCart[id].qty <= 0) delete currentCart[id];
            }
            renderMenu();
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const items = Object.values(currentCart);
            const count = items.reduce((a, b) => a + b.qty, 0);
            const hasOrders = tableOrders[selectedTableId]?.length > 0;
            document.getElementById('bottom-cart-bar').classList.toggle('hidden', count === 0 && !hasOrders);
            document.getElementById('bill-btn').classList.toggle('hidden', !hasOrders);
            document.getElementById('cart-item-count').innerText = `${count} ITEMS DRAFTED`;
        }

        function toggleOrderSummary() {
            const items = Object.values(currentCart);
            if(items.length === 0) return;
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="mb-6"><h3 class="text-2xl font-800">Confirm KOT</h3><p class="text-xs font-bold text-slate-400">Punch items to kitchen</p></div>
                <div class="space-y-3 mb-6">${items.map(i => `<div class="flex justify-between p-4 bg-slate-50 rounded-2xl font-bold"><span>${i.name}</span><span>x${i.qty}</span></div>`).join('')}</div>
                <div class="flex gap-2">
                    <button onclick="printTicket('KOT', ${JSON.stringify(items).replace(/"/g, '&quot;')})" class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-600"><i class="fas fa-print"></i></button>
                    <button onclick="sendKOT()" class="flex-1 bg-slate-900 text-white rounded-2xl font-bold">SEND TO KITCHEN</button>
                </div>
            `;
            openModal();
        }

        function sendKOT() {
            const now = new Date();
            const items = Object.values(currentCart);
            if(!tableOrders[selectedTableId]) tableOrders[selectedTableId] = [];
            tableOrders[selectedTableId].push({ items, time: now.toLocaleTimeString() });
            localStorage.setItem(`${APP_ID}_tableOrders`, JSON.stringify(tableOrders));
            
            let msg = `*NEW KOT: ${selectedTableId}*\n------------------\n`;
            items.forEach(i => msg += `• ${i.name} x ${i.qty}\n`);
            msg += `------------------\n*Time:* ${now.toLocaleTimeString()}`;
            
            currentCart = {};
            closeModals();
            selectTable(selectedTableId);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function openBillSummary() {
            const kots = tableOrders[selectedTableId];
            const finalItems = {};
            kots.forEach(k => k.items.forEach(i => {
                if(finalItems[i.id]) finalItems[i.id].qty += i.qty;
                else finalItems[i.id] = {...i};
            }));
            const itemsArr = Object.values(finalItems);
            const total = itemsArr.reduce((a, b) => a + (b.qty * b.price), 0);

            document.getElementById('modal-body').innerHTML = `
                <div class="mb-6"><h3 class="text-3xl font-800 text-indigo-600">Final Bill</h3><p class="text-xs font-bold text-slate-400">${selectedTableId}</p></div>
                <div class="space-y-2 mb-6 border-y border-slate-50 py-4 max-h-[250px] overflow-y-auto no-scrollbar">
                    ${itemsArr.map(i => `<div class="flex justify-between text-sm font-bold"><span>${i.name} x${i.qty}</span><span>₹${i.qty*i.price}</span></div>`).join('')}
                </div>
                <div class="flex justify-between items-center mb-8"><span class="text-xs font-black text-slate-400 uppercase">Total Amount</span><span class="text-3xl font-black">₹${total}</span></div>
                <div class="flex flex-col gap-3">
                    <div class="flex gap-2">
                        <button onclick="printTicket('BILL', ${JSON.stringify(itemsArr).replace(/"/g, '&quot;')}, ${total})" class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-600"><i class="fas fa-print"></i></button>
                        <button onclick="finalizeBill(${total}, ${JSON.stringify(itemsArr).replace(/"/g, '&quot;')})" class="flex-1 bg-emerald-600 text-white rounded-2xl font-bold">PAID & CLOSE</button>
                    </div>
                    <button onclick="closeModals()" class="text-slate-400 font-bold py-2">Go Back</button>
                </div>
            `;
            openModal();
        }

        function printTicket(type, items, total = 0) {
            const printDiv = document.getElementById('print-section');
            const now = new Date();
            let html = `
                <div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px; margin-bottom:10px;">
                    <h2 style="margin:0">PROKOT POS</h2>
                    <p style="margin:5px 0; font-size:10px;">${type} RECEIPT</p>
                    <p style="margin:0; font-size:10px;">Table: ${selectedTableId}</p>
                    <p style="margin:0; font-size:10px;">${now.toLocaleString()}</p>
                </div>
                <table style="width:100%; font-size:11px; border-collapse:collapse;">
                    <thead><tr style="border-bottom:1px solid #000; text-align:left;"><th>Item</th><th>Qty</th>${type==='BILL'?'<th>Amt</th>':''}</tr></thead>
                    <tbody>
                        ${items.map(i => `<tr><td>${i.name}</td><td>${i.qty}</td>${type==='BILL'?'<td>'+(i.qty*i.price)+'</td>':''}</tr>`).join('')}
                    </tbody>
                </table>
            `;
            if(type === 'BILL') {
                html += `<div style="margin-top:10px; border-top:1px dashed #000; padding-top:10px; text-align:right;"><strong>Total: ₹${total}</strong></div>`;
            }
            html += `<div style="text-align:center; font-size:9px; margin-top:20px;">- Thank You -</div>`;
            printDiv.innerHTML = html;
            window.print();
        }

        function finalizeBill(total, items) {
            const now = new Date();
            const billId = `B${now.getTime().toString().slice(-6)}`;
            const name = document.getElementById('customer-name').value || 'Guest';
            const phone = document.getElementById('customer-phone').value || 'NA';
            
            salesReport.unshift({ billId, table: selectedTableId, customer: name, phone, total, items, time: now.toLocaleTimeString() });
            localStorage.setItem(`${APP_ID}_salesReport`, JSON.stringify(salesReport));
            delete tableOrders[selectedTableId];
            localStorage.setItem(`${APP_ID}_tableOrders`, JSON.stringify(tableOrders));
            
            closeModals();
            goToTables();
        }

        function renderReports() {
            const container = document.getElementById('sales-list');
            container.innerHTML = salesReport.length === 0 ? '<p class="text-center py-20 font-bold text-slate-300">No sales records</p>' : '';
            salesReport.forEach(sale => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div><span class="text-[8px] font-black text-indigo-500 uppercase">${sale.billId}</span><h4 class="text-xl font-800">${sale.table}</h4></div>
                        <div class="text-right"><p class="text-[10px] text-slate-400 font-bold uppercase mb-1">${sale.time}</p><span class="text-lg font-black">₹${sale.total}</span></div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-xl text-[10px] font-bold text-slate-500">${sale.items.map(i => `<span>${i.name}(x${i.qty}) </span>`).join(', ')}</div>
                `;
                container.appendChild(div);
            });
            updateReportTotals();
        }

        function updateReportTotals() {
            const total = salesReport.reduce((a, b) => a + b.total, 0);
            const el = document.getElementById('total-sales-today');
            if(el) el.innerText = `Total Revenue: ₹${total}`;
        }

        function openModal() {
            document.getElementById('summary-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('summary-content').classList.remove('translate-y-full'), 10);
        }

        function closeModals() {
            document.getElementById('summary-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('summary-modal').classList.add('hidden'), 300);
        }

        function clearAllData() { if(confirm("Clear all restaurant data?")) { localStorage.clear(); location.reload(); } }

        window.addEventListener('load', init);
    </script>
</body>
</html>
