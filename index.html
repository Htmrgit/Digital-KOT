<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProKOT - Table First POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #f43f5e;
            --success: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }

        .category-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 12px -3px rgba(99, 102, 241, 0.3);
        }

        .table-card.active {
            border-color: var(--primary);
            background: #eff6ff;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Veg/Non-Veg Icons */
        .veg-indicator { width: 12px; height: 12px; border: 1px solid #10b981; padding: 2px; display: flex; justify-content: center; align-items: center; }
        .veg-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; }
        .nonveg-indicator { width: 12px; height: 12px; border: 1px solid #ef4444; padding: 2px; display: flex; justify-content: center; align-items: center; }
        .nonveg-dot { width: 0; height: 0; border-left: 3px solid transparent; border-right: 3px solid transparent; border-bottom: 5px solid #ef4444; }
    </style>
</head>
<body class="selection:bg-indigo-100">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button id="back-btn" onclick="goToTables()" class="hidden w-10 h-10 rounded-xl bg-slate-100 text-slate-600 flex items-center justify-center active:scale-90 transition-all">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div id="brand-logo" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-100">
                    <i class="fas fa-utensils text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-800 tracking-tight">ProKOT</h1>
                    <p id="header-status" class="text-[10px] uppercase font-bold text-slate-400">Select Table</p>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="switchTab('history')" class="w-10 h-10 rounded-xl text-slate-400 hover:bg-slate-100 flex items-center justify-center relative">
                <i class="fas fa-history text-lg"></i>
                <span id="history-badge" class="hidden absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full"></span>
            </button>
        </div>
    </header>

    <!-- STEP 1: TABLE SELECTION GRID -->
    <main id="view-tables" class="px-5 py-6 animate-fade-in">
        <div class="mb-6">
            <h2 class="text-2xl font-800 text-slate-900 tracking-tight">Tables</h2>
            <p class="text-sm text-slate-500 font-medium">Choose a table to start ordering</p>
        </div>

        <div class="grid grid-cols-3 gap-4" id="table-grid">
            <!-- Tables generated by JS -->
        </div>

        <div class="mt-8">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Quick Actions</h3>
            <button onclick="selectTable('Takeaway')" class="w-full bg-white p-5 rounded-3xl border border-slate-100 card-shadow flex items-center justify-between group active:bg-indigo-50 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-xl">
                        <i class="fas fa-bag-shopping"></i>
                    </div>
                    <div class="text-left">
                        <p class="font-800 text-slate-800">Parcel / Takeaway</p>
                        <p class="text-xs text-slate-400 font-medium">Quick checkout</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-300 group-active:text-indigo-500"></i>
            </button>
        </div>
    </main>

    <!-- STEP 2: CATEGORY WISE MENU -->
    <main id="view-menu" class="hidden px-5 py-6 mb-32 animate-fade-in">
        <!-- Current Table Info & Customer Name -->
        <div class="bg-indigo-600 rounded-[2rem] p-6 mb-8 text-white shadow-xl shadow-indigo-100 flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <div>
                    <span class="text-[10px] font-black uppercase tracking-widest opacity-70">Active Table</span>
                    <h3 id="display-selected-table" class="text-3xl font-800">Table 01</h3>
                </div>
                <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-2xl">
                    <i class="fas fa-receipt"></i>
                </div>
            </div>
            <div class="relative">
                <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-white/50 text-sm"></i>
                <input type="text" id="customer-name" placeholder="Customer Name (Optional)" class="w-full bg-white/10 border border-white/20 rounded-2xl pl-10 pr-4 py-3 text-sm font-bold placeholder:text-white/40 focus:bg-white/20 transition-all outline-none">
            </div>
        </div>

        <!-- Search & Filter -->
        <div class="space-y-5 mb-8">
            <div class="relative group">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 transition-colors"></i>
                <input type="text" id="menu-search" oninput="renderMenu()" placeholder="Search dishes..." class="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl focus:ring-4 focus:ring-indigo-50/50 shadow-sm transition-all text-sm font-medium">
            </div>

            <!-- Category Scrolling -->
            <div class="flex overflow-x-auto gap-3 py-1 no-scrollbar">
                <button onclick="filterMenu('All')" class="category-tab active px-6 py-2.5 rounded-2xl whitespace-nowrap text-sm font-bold bg-white text-slate-500 transition-all card-shadow">All Items</button>
                <button onclick="filterMenu('Starters')" class="category-tab px-6 py-2.5 rounded-2xl whitespace-nowrap text-sm font-bold bg-white text-slate-500 transition-all card-shadow">Starters</button>
                <button onclick="filterMenu('Main Course')" class="category-tab px-6 py-2.5 rounded-2xl whitespace-nowrap text-sm font-bold bg-white text-slate-500 transition-all card-shadow">Mains</button>
                <button onclick="filterMenu('Breads')" class="category-tab px-6 py-2.5 rounded-2xl whitespace-nowrap text-sm font-bold bg-white text-slate-500 transition-all card-shadow">Breads</button>
                <button onclick="filterMenu('Drinks')" class="category-tab px-6 py-2.5 rounded-2xl whitespace-nowrap text-sm font-bold bg-white text-slate-500 transition-all card-shadow">Drinks</button>
            </div>
        </div>

        <!-- Menu Grid -->
        <div id="menu-grid" class="grid grid-cols-1 gap-4">
            <!-- Items injected by JS -->
        </div>
    </main>

    <!-- STEP 3: HISTORY -->
    <main id="view-history" class="hidden px-5 py-6 min-h-screen">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-800 text-slate-900 tracking-tight">KOT History</h2>
            <button onclick="clearHistory()" class="text-xs font-bold text-rose-500">Clear All</button>
        </div>
        <div id="history-list" class="space-y-4 pb-20">
            <!-- History Items -->
        </div>
    </main>

    <!-- Floating Cart Bar -->
    <div id="bottom-cart-bar" class="hidden fixed bottom-0 left-0 right-0 p-6 z-50">
        <div class="max-w-md mx-auto">
            <button onclick="toggleSummary()" class="w-full bg-slate-900 text-white p-4 rounded-[2rem] flex items-center justify-between shadow-2xl active:scale-95 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center text-xl shadow-lg">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <div class="text-left">
                        <p id="cart-item-count" class="text-[10px] font-bold uppercase tracking-widest text-indigo-400">0 Items</p>
                        <p id="cart-total-display" class="text-lg font-bold">Review Order</p>
                    </div>
                </div>
                <div class="bg-white/10 px-4 py-2 rounded-full flex items-center gap-2">
                    <span class="text-sm font-bold">NEXT</span>
                    <i class="fas fa-arrow-right text-xs"></i>
                </div>
            </button>
        </div>
    </div>

    <!-- Summary Modal -->
    <div id="summary-modal" class="hidden fixed inset-0 z-[60]">
        <div onclick="toggleSummary()" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div id="summary-content" class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[3rem] p-8 transition-transform duration-300 translate-y-full shadow-2xl">
            <div class="w-16 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h3 class="text-3xl font-800 text-slate-900">Summary</h3>
                    <p id="summary-meta" class="text-sm font-medium text-slate-500">Table Info</p>
                </div>
                <button onclick="clearOrderConfirm()" class="w-10 h-10 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center"><i class="fas fa-trash"></i></button>
            </div>
            <div id="summary-items" class="max-h-[40vh] overflow-y-auto space-y-4 mb-8 no-scrollbar"></div>
            <div class="space-y-4">
                <div class="flex justify-between items-center font-800 text-xl px-2">
                    <span class="text-slate-400 uppercase text-[10px]">Total Amount</span>
                    <span id="final-total" class="text-indigo-600">₹0</span>
                </div>
                <button onclick="sendOrder()" class="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-800 text-xl shadow-xl flex items-center justify-center gap-4 active:scale-95 transition-all">
                    <i class="fab fa-whatsapp text-2xl"></i> SEND TO KITCHEN
                </button>
            </div>
        </div>
    </div>

    <!-- Alert/Confirm Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="relative bg-white rounded-[2.5rem] p-8 w-full max-w-sm text-center">
            <h4 id="confirm-title" class="text-2xl font-800 mb-2">Are you sure?</h4>
            <p id="confirm-msg" class="text-slate-500 mb-8">This action is permanent.</p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeConfirm()" class="py-4 font-bold text-slate-400">Cancel</button>
                <button id="confirm-btn" class="py-4 font-bold text-white bg-rose-500 rounded-2xl">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const WHATSAPP_NUMBER = "919910109626";
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'pro-kot-v3';

        const menuData = [
            { id: 1, name: "Paneer Butter Masala", price: 240, category: "Main Course", isVeg: true, desc: "Creamy tomato curry" },
            { id: 2, name: "Chicken Tikka", price: 320, category: "Starters", isVeg: false, desc: "Tandoori grilled chicken" },
            { id: 3, name: "Butter Roti", price: 25, category: "Breads", isVeg: true, desc: "Whole wheat bread" },
            { id: 4, name: "Garlic Naan", price: 45, category: "Breads", isVeg: true, desc: "Soft leavened bread" },
            { id: 5, name: "Crispy Corn", price: 180, category: "Starters", isVeg: true, desc: "Spicy fried corn" },
            { id: 6, name: "Dal Makhani", price: 210, category: "Main Course", isVeg: true, desc: "Black lentils slow cooked" },
            { id: 7, name: "Mutton Curry", price: 450, category: "Main Course", isVeg: false, desc: "Spicy goat meat curry" },
            { id: 8, name: "Masala Chai", price: 40, category: "Drinks", isVeg: true, desc: "Indian spiced tea" },
            { id: 9, name: "Cold Coffee", price: 120, category: "Drinks", isVeg: true, desc: "Blended with icecream" }
        ];

        let selectedTable = null;
        let currentCart = {};
        let activeCategory = 'All';
        let history = JSON.parse(localStorage.getItem(`${APP_ID}_history`) || "[]");

        // --- APP LOGIC ---

        function init() {
            renderTables();
            updateHistoryBadge();
        }

        function renderTables() {
            const grid = document.getElementById('table-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const tableId = `Table ${i}`;
                const div = document.createElement('div');
                div.onclick = () => selectTable(tableId);
                div.className = "bg-white p-6 rounded-3xl border border-slate-100 card-shadow flex flex-col items-center justify-center gap-2 active:scale-95 transition-all cursor-pointer";
                div.innerHTML = `
                    <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center text-lg font-bold">
                        ${i.toString().padStart(2, '0')}
                    </div>
                    <span class="text-xs font-bold text-slate-400 uppercase">Table</span>
                `;
                grid.appendChild(div);
            }
        }

        function selectTable(tableId) {
            selectedTable = tableId;
            document.getElementById('view-tables').classList.add('hidden');
            document.getElementById('view-menu').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('display-selected-table').innerText = tableId;
            document.getElementById('header-status').innerText = 'Ordering';
            renderMenu();
        }

        function goToTables() {
            selectedTable = null;
            document.getElementById('view-tables').classList.remove('hidden');
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-history').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('header-status').innerText = 'Select Table';
        }

        function switchTab(tab) {
            if (tab === 'history') {
                document.getElementById('view-tables').classList.add('hidden');
                document.getElementById('view-menu').classList.add('hidden');
                document.getElementById('view-history').classList.remove('hidden');
                document.getElementById('back-btn').classList.remove('hidden');
                document.getElementById('header-status').innerText = 'History';
                renderHistory();
            }
        }

        function filterMenu(category) {
            activeCategory = category;
            document.querySelectorAll('.category-tab').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.includes(category));
            });
            renderMenu();
        }

        function renderMenu() {
            const container = document.getElementById('menu-grid');
            const search = document.getElementById('menu-search').value.toLowerCase();
            container.innerHTML = '';

            const filtered = menuData.filter(item => {
                const matchCat = activeCategory === 'All' || item.category === activeCategory;
                const matchSearch = item.name.toLowerCase().includes(search);
                return matchCat && matchSearch;
            });

            filtered.forEach(item => {
                const qty = currentCart[item.id]?.qty || 0;
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl border border-slate-100 card-shadow flex items-center justify-between";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <div class="${item.isVeg ? 'veg-indicator' : 'nonveg-indicator'} bg-white absolute -top-1 -left-1 rounded-sm shadow-sm">
                                <div class="${item.isVeg ? 'veg-dot' : 'nonveg-dot'}"></div>
                            </div>
                            <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center font-black text-indigo-400">${item.name.charAt(0)}</div>
                        </div>
                        <div>
                            <h4 class="font-800 text-slate-800 leading-tight">${item.name}</h4>
                            <p class="text-[10px] text-slate-400 font-bold">₹${item.price}</p>
                        </div>
                    </div>
                    <div class="flex flex-col items-center bg-slate-50 rounded-2xl p-1 border border-slate-100">
                        <button onclick="updateQty(${item.id}, 1)" class="w-10 h-10 bg-white rounded-xl text-indigo-600 shadow-sm active:scale-110 transition-transform"><i class="fas fa-plus text-xs"></i></button>
                        <span id="qty-${item.id}" class="h-8 flex items-center justify-center font-bold text-slate-700">${qty}</span>
                        <button onclick="updateQty(${item.id}, -1)" class="w-10 h-10 text-slate-300 active:text-rose-500 transition-colors"><i class="fas fa-minus text-xs"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateQty(id, delta) {
            if (navigator.vibrate) navigator.vibrate(5);
            const item = menuData.find(m => m.id === id);
            if (!currentCart[id] && delta > 0) currentCart[id] = { ...item, qty: 1 };
            else if (currentCart[id]) {
                currentCart[id].qty += delta;
                if (currentCart[id].qty <= 0) delete currentCart[id];
            }
            
            const label = document.getElementById(`qty-${id}`);
            if (label) label.innerText = currentCart[id]?.qty || 0;
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const items = Object.values(currentCart);
            const totalItems = items.reduce((acc, curr) => acc + curr.qty, 0);
            const totalAmount = items.reduce((acc, curr) => acc + (curr.qty * curr.price), 0);
            
            const bar = document.getElementById('bottom-cart-bar');
            if (totalItems > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-item-count').innerText = `${totalItems} Items Selected`;
                document.getElementById('cart-total-display').innerText = `Amount: ₹${totalAmount}`;
            } else {
                bar.classList.add('hidden');
            }
        }

        function toggleSummary() {
            const modal = document.getElementById('summary-modal');
            const content = document.getElementById('summary-content');
            if (modal.classList.contains('hidden')) {
                const customer = document.getElementById('customer-name').value || "Guest";
                document.getElementById('summary-meta').innerText = `${selectedTable} • ${customer}`;
                renderSummaryList();
                modal.classList.remove('hidden');
                setTimeout(() => content.classList.remove('translate-y-full'), 10);
            } else {
                content.classList.add('translate-y-full');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        function renderSummaryList() {
            const container = document.getElementById('summary-items');
            container.innerHTML = '';
            let total = 0;
            Object.values(currentCart).forEach(item => {
                total += item.qty * item.price;
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-slate-50 p-4 rounded-2xl";
                div.innerHTML = `<div><p class="font-bold text-slate-800">${item.name}</p><p class="text-[10px] text-slate-400 font-bold">${item.qty} x ₹${item.price}</p></div><span class="font-800">₹${item.qty * item.price}</span>`;
                container.appendChild(div);
            });
            document.getElementById('final-total').innerText = `₹${total}`;
        }

        function sendOrder() {
            const customer = document.getElementById('customer-name').value || "Guest";
            const items = Object.values(currentCart);
            if (items.length === 0) return;

            const now = new Date();
            const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
            const kotId = `KOT-${dateStr}-${(history.length + 1).toString().padStart(3, '0')}`;
            const time = now.toLocaleString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });

            let msg = `*🔥 NEW KOT: ${kotId}*\n*📍 TABLE:* ${selectedTable}\n*👤 CUSTOMER:* ${customer}\n----------------------------\n`;
            items.forEach(i => msg += `• ${i.name} x ${i.qty}\n`);
            msg += `----------------------------\n*⏰ TIME:* ${time}`;

            history.unshift({ kotId, table: selectedTable, customer, items, total: items.reduce((a, b) => a + (b.qty * b.price), 0), time: now.toLocaleString() });
            localStorage.setItem(`${APP_ID}_history`, JSON.stringify(history));

            // Reset
            currentCart = {};
            document.getElementById('customer-name').value = '';
            updateCartDisplay();
            updateHistoryBadge();
            toggleSummary();
            goToTables();

            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = history.length === 0 ? '<p class="text-center text-slate-300 py-10 font-bold">No Records</p>' : '';
            history.forEach((order, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2rem] border border-slate-100 card-shadow";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div><span class="text-[9px] font-black text-indigo-500 uppercase">${order.kotId}</span><h4 class="text-xl font-800">${order.table}</h4></div>
                        <div class="text-right"><p class="text-[10px] text-slate-400 font-bold">${order.time}</p><span class="text-lg font-black text-indigo-600">₹${order.total}</span></div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl text-sm font-medium text-slate-600 mb-4">${order.items.map(i => `<div class="flex justify-between"><span>${i.name}</span><span>x${i.qty}</span></div>`).join('')}</div>
                    <button onclick="deleteHistoryItem(${idx})" class="w-full text-rose-400 font-bold py-2">Delete Record</button>
                `;
                container.appendChild(div);
            });
        }

        function updateHistoryBadge() {
            document.getElementById('history-badge').classList.toggle('hidden', history.length === 0);
        }

        function deleteHistoryItem(idx) {
            history.splice(idx, 1);
            localStorage.setItem(`${APP_ID}_history`, JSON.stringify(history));
            renderHistory();
            updateHistoryBadge();
        }

        function clearHistory() { history = []; localStorage.setItem(`${APP_ID}_history`, "[]"); renderHistory(); updateHistoryBadge(); }
        function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }
        function clearOrderConfirm() { currentCart = {}; updateCartDisplay(); toggleSummary(); renderMenu(); }

        window.addEventListener('load', init);
    </script>
</body>
</html>
