<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuickKOT - Digital POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .menu-card {
            transition: transform 0.1s active;
        }
        
        .menu-card:active {
            transform: scale(0.95);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Category Tab Active State */
        .category-tab.active {
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
        }

        /* Vibration Animation for add button */
        @keyframes pulse-sm {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .added-anim {
            animation: pulse-sm 0.2s ease-in-out;
        }

        /* Modal backdrop blur */
        .modal-overlay {
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- App Header -->
    <header class="sticky top-0 z-40 bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 text-white p-2 rounded-lg">
                <i class="fas fa-utensils"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800">QuickKOT</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="switchTab('order')" id="tab-order" class="p-2 rounded-lg bg-indigo-50 text-indigo-600">
                <i class="fas fa-plus"></i>
            </button>
            <button onclick="switchTab('history')" id="tab-history" class="p-2 rounded-lg text-slate-500 hover:bg-slate-100">
                <i class="fas fa-history"></i>
            </button>
        </div>
    </header>

    <!-- MAIN ORDER SCREEN -->
    <main id="view-order" class="p-4 mb-32 transition-opacity duration-300">
        
        <!-- Order Header Info -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-100">
                <label class="text-xs font-semibold text-slate-400 uppercase block mb-1">Select Table</label>
                <select id="table-select" class="w-full bg-transparent font-bold text-slate-800 focus:outline-none text-lg">
                    <option value="">Table #</option>
                    <option value="Table 1">Table 1</option>
                    <option value="Table 2">Table 2</option>
                    <option value="Table 3">Table 3</option>
                    <option value="Table 4">Table 4</option>
                    <option value="Table 5">Table 5</option>
                    <option value="Table 6">Table 6</option>
                    <option value="Table 7">Table 7</option>
                    <option value="Table 8">Table 8</option>
                    <option value="Parcel">Parcel / Takeaway</option>
                </select>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-100">
                <label class="text-xs font-semibold text-slate-400 uppercase block mb-1">Customer Name</label>
                <input type="text" id="customer-name" placeholder="Optional" class="w-full bg-transparent font-medium text-slate-800 focus:outline-none">
            </div>
        </div>

        <!-- Menu Search & Categories -->
        <div class="space-y-4 mb-6">
            <!-- Item Search -->
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="menu-search" oninput="renderMenu()" placeholder="Search dishes (e.g. Paneer, Roti)..." class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm text-sm">
            </div>

            <!-- Categories -->
            <div class="flex overflow-x-auto gap-2 pb-2 no-scrollbar custom-scrollbar">
                <button onclick="filterMenu('All')" class="category-tab active px-5 py-2 rounded-full whitespace-nowrap text-sm font-semibold border border-slate-200 bg-white text-slate-600 transition-all">All</button>
                <button onclick="filterMenu('Starters')" class="category-tab px-5 py-2 rounded-full whitespace-nowrap text-sm font-semibold border border-slate-200 bg-white text-slate-600 transition-all">Starters</button>
                <button onclick="filterMenu('Main Course')" class="category-tab px-5 py-2 rounded-full whitespace-nowrap text-sm font-semibold border border-slate-200 bg-white text-slate-600 transition-all">Main Course</button>
                <button onclick="filterMenu('Breads')" class="category-tab px-5 py-2 rounded-full whitespace-nowrap text-sm font-semibold border border-slate-200 bg-white text-slate-600 transition-all">Breads</button>
                <button onclick="filterMenu('Drinks')" class="category-tab px-5 py-2 rounded-full whitespace-nowrap text-sm font-semibold border border-slate-200 bg-white text-slate-600 transition-all">Drinks</button>
            </div>
        </div>

        <!-- Menu Grid -->
        <div id="menu-grid" class="grid grid-cols-1 gap-3">
            <!-- Items injected by JS -->
        </div>
    </main>

    <!-- HISTORY SCREEN -->
    <main id="view-history" class="hidden p-4 transition-opacity duration-300">
        <div class="mb-4">
            <h2 class="text-2xl font-bold text-slate-800">Order History</h2>
            <p class="text-sm text-slate-500">Track all kitchen tickets</p>
        </div>

        <div class="flex gap-2 mb-4">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="history-search" onkeyup="renderHistory()" placeholder="Search KOT or Table..." class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm">
            </div>
        </div>

        <div id="history-list" class="space-y-3 pb-24">
            <!-- History items injected by JS -->
        </div>
    </main>

    <!-- Bottom Bar / Cart Button -->
    <div id="bottom-cart-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 safe-area-bottom z-50">
        <div class="flex items-center justify-between gap-4">
            <div class="flex flex-col">
                <span id="cart-item-count" class="text-xs font-bold text-slate-400 uppercase tracking-wider">0 Items</span>
                <span id="cart-total-display" class="text-lg font-extrabold text-slate-800">Ready to Order</span>
            </div>
            <button onclick="toggleSummary()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-2xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95">
                <i class="fas fa-receipt"></i>
                View Summary
            </button>
        </div>
    </div>

    <!-- Order Summary Bottom Sheet -->
    <div id="summary-modal" class="hidden fixed inset-0 z-[60]">
        <div onclick="toggleSummary()" class="modal-overlay absolute inset-0 bg-slate-900/60"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] p-6 shadow-2xl transition-transform duration-300 transform translate-y-full" id="summary-content">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-800">Order Summary</h3>
                <button onclick="clearOrderConfirm()" class="text-red-500 text-sm font-semibold flex items-center gap-1">
                    <i class="fas fa-trash"></i> Clear All
                </button>
            </div>

            <div id="summary-items" class="max-h-[50vh] overflow-y-auto space-y-4 mb-6 custom-scrollbar pr-2">
                <!-- Cart items injected by JS -->
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="sendOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-bold text-lg shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <i class="fab fa-whatsapp text-2xl"></i>
                    Send to Kitchen (WhatsApp)
                </button>
                <button onclick="toggleSummary()" class="w-full text-slate-500 font-bold py-2">
                    Back to Menu
                </button>
            </div>
        </div>
    </div>

    <!-- Simple Custom Confirmation Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="relative bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
            <h4 id="confirm-title" class="text-xl font-bold text-slate-800 mb-2">Are you sure?</h4>
            <p id="confirm-msg" class="text-slate-500 mb-6">This will clear your current selection.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-3 font-bold text-slate-400 hover:bg-slate-50 rounded-xl">Cancel</button>
                <button id="confirm-btn" class="flex-1 py-3 font-bold text-white bg-red-500 rounded-xl shadow-lg">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const WHATSAPP_NUMBER = "919910109626";
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'kot-app-v1';

        const menuData = [
            { id: 1, name: "Paneer Butter Masala", price: 240, category: "Main Course", isVeg: true },
            { id: 2, name: "Chicken Tikka", price: 320, category: "Starters", isVeg: false },
            { id: 3, name: "Butter Roti", price: 25, category: "Breads", isVeg: true },
            { id: 4, name: "Garlic Naan", price: 45, category: "Breads", isVeg: true },
            { id: 5, name: "Crispy Corn", price: 180, category: "Starters", isVeg: true },
            { id: 6, name: "Dal Makhani", price: 210, category: "Main Course", isVeg: true },
            { id: 7, name: "Mutton Rogan Josh", price: 450, category: "Main Course", isVeg: false },
            { id: 8, name: "Fresh Lime Soda", price: 80, category: "Drinks", isVeg: true },
            { id: 9, name: "Gulab Jamun", price: 60, category: "Desserts", isVeg: true },
            { id: 10, name: "Tandoori Chicken", price: 350, category: "Starters", isVeg: false },
            { id: 11, name: "Jeera Rice", price: 120, category: "Main Course", isVeg: true },
            { id: 12, name: "Coke / Sprite", price: 40, category: "Drinks", isVeg: true }
        ];

        let currentCart = {};
        let activeCategory = 'All';
        let history = JSON.parse(localStorage.getItem(`${APP_ID}_history`) || "[]");

        // --- APP LOGIC ---

        function init() {
            renderMenu();
            renderHistory();
            updateCartDisplay();
        }

        function switchTab(tab) {
            const orderView = document.getElementById('view-order');
            const historyView = document.getElementById('view-history');
            const bottomBar = document.getElementById('bottom-cart-bar');
            
            const btnOrder = document.getElementById('tab-order');
            const btnHistory = document.getElementById('tab-history');

            if (tab === 'order') {
                orderView.classList.remove('hidden');
                historyView.classList.add('hidden');
                bottomBar.classList.remove('hidden');
                btnOrder.classList.add('bg-indigo-50', 'text-indigo-600');
                btnOrder.classList.remove('text-slate-500');
                btnHistory.classList.remove('bg-indigo-50', 'text-indigo-600');
                btnHistory.classList.add('text-slate-500');
            } else {
                orderView.classList.add('hidden');
                historyView.classList.remove('hidden');
                bottomBar.classList.add('hidden');
                btnHistory.classList.add('bg-indigo-50', 'text-indigo-600');
                btnHistory.classList.remove('text-slate-500');
                btnOrder.classList.remove('bg-indigo-50', 'text-indigo-600');
                btnOrder.classList.add('text-slate-500');
                renderHistory();
            }
        }

        function filterMenu(category) {
            activeCategory = category;
            document.querySelectorAll('.category-tab').forEach(btn => {
                if(btn.innerText === category) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderMenu();
        }

        function renderMenu() {
            const container = document.getElementById('menu-grid');
            const searchQuery = document.getElementById('menu-search').value.toLowerCase().trim();
            container.innerHTML = '';

            // Apply Category Filter + Search Filter
            const filtered = menuData.filter(item => {
                const matchesCategory = activeCategory === 'All' || item.category === activeCategory;
                const matchesSearch = item.name.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="py-12 text-center">
                        <i class="fas fa-search text-slate-200 text-5xl mb-4"></i>
                        <p class="text-slate-400 font-medium">No items match your search</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(item => {
                const qty = currentCart[item.id]?.qty || 0;
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between transition-all menu-card";
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full ${item.isVeg ? 'bg-green-500' : 'bg-red-500'}"></div>
                        <div>
                            <h4 class="font-bold text-slate-800">${item.name}</h4>
                            <p class="text-xs font-semibold text-slate-400">₹${item.price}</p>
                        </div>
                    </div>
                    <div class="flex items-center bg-slate-50 rounded-xl p-1 border border-slate-100">
                        <button onclick="updateQty(${item.id}, -1)" class="w-10 h-10 flex items-center justify-center text-slate-400 active:text-indigo-600">
                            <i class="fas fa-minus text-xs"></i>
                        </button>
                        <span id="qty-${item.id}" class="w-8 text-center font-bold text-slate-800">${qty}</span>
                        <button onclick="updateQty(${item.id}, 1)" class="w-10 h-10 flex items-center justify-center text-indigo-600 active:scale-125 transition-transform">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateQty(id, delta) {
            if (navigator.vibrate) navigator.vibrate(10);

            const item = menuData.find(m => m.id === id);
            if (!currentCart[id]) {
                if (delta > 0) {
                    currentCart[id] = { ...item, qty: 1 };
                }
            } else {
                currentCart[id].qty += delta;
                if (currentCart[id].qty <= 0) {
                    delete currentCart[id];
                }
            }
            
            // Visual feedback
            const qtyLabel = document.getElementById(`qty-${id}`);
            if (qtyLabel) {
                qtyLabel.innerText = currentCart[id]?.qty || 0;
                qtyLabel.classList.add('added-anim');
                setTimeout(() => qtyLabel.classList.remove('added-anim'), 200);
            }

            updateCartDisplay();
        }

        function updateCartDisplay() {
            const items = Object.values(currentCart);
            const totalItems = items.reduce((acc, curr) => acc + curr.qty, 0);
            
            document.getElementById('cart-item-count').innerText = `${totalItems} Items`;
            
            if (totalItems > 0) {
                document.getElementById('cart-total-display').innerText = `KOT Pending...`;
                document.getElementById('bottom-cart-bar').classList.remove('translate-y-full');
            } else {
                document.getElementById('cart-total-display').innerText = `Ready to Order`;
            }
        }

        function toggleSummary() {
            const modal = document.getElementById('summary-modal');
            const content = document.getElementById('summary-content');
            
            if (modal.classList.contains('hidden')) {
                renderSummary();
                modal.classList.remove('hidden');
                setTimeout(() => content.classList.remove('translate-y-full'), 10);
            } else {
                content.classList.add('translate-y-full');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        function renderSummary() {
            const container = document.getElementById('summary-items');
            container.innerHTML = '';
            
            const items = Object.values(currentCart);
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="py-12 text-center">
                        <i class="fas fa-shopping-basket text-slate-200 text-5xl mb-4"></i>
                        <p class="text-slate-400 font-medium">Your cart is empty</p>
                    </div>
                `;
                return;
            }

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-slate-50 p-4 rounded-2xl border border-slate-100";
                div.innerHTML = `
                    <div class="flex-1">
                        <h5 class="font-bold text-slate-800">${item.name}</h5>
                        <p class="text-xs text-slate-400 font-semibold">Qty: ${item.qty} × ₹${item.price}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-800">₹${item.qty * item.price}</span>
                        <button onclick="updateQty(${item.id}, -1); renderSummary();" class="text-red-400 hover:text-red-500">
                            <i class="fas fa-minus-circle text-lg"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function generateKOTId() {
            const now = new Date();
            const dateStr = now.getFullYear() + 
                            String(now.getMonth() + 1).padStart(2, '0') + 
                            String(now.getDate()).padStart(2, '0');
            
            // Find orders from today to increment counter
            const todayKOTs = history.filter(o => o.kotId.includes(`KOT-${dateStr}`));
            const nextNum = (todayKOTs.length + 1).toString().padStart(3, '0');
            
            return `KOT-${dateStr}-${nextNum}`;
        }

        function sendOrder() {
            const table = document.getElementById('table-select').value;
            const customer = document.getElementById('customer-name').value || "Guest";
            const items = Object.values(currentCart);

            if (!table) {
                showSimpleAlert("Error", "Please select a Table number first.", "bg-red-500");
                return;
            }

            if (items.length === 0) {
                showSimpleAlert("Error", "Your order is empty.", "bg-red-500");
                return;
            }

            const kotId = generateKOTId();
            const timestamp = new Date().toLocaleString('en-IN', {
                day: '2-digit',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });

            // Build Message
            let message = `*KOT No:* ${kotId}\n`;
            message += `*Table:* ${table}\n`;
            message += `*Customer:* ${customer}\n`;
            message += `----------------------------\n`;
            message += `*Items:*\n`;
            items.forEach(item => {
                message += `• ${item.name} x${item.qty}\n`;
            });
            message += `----------------------------\n`;
            message += `*Time:* ${timestamp}`;

            // Save to LocalStorage
            const orderObj = {
                kotId,
                table,
                customer,
                items,
                timestamp,
                total: items.reduce((a, b) => a + (b.qty * b.price), 0)
            };
            
            history.unshift(orderObj);
            localStorage.setItem(`${APP_ID}_history`, JSON.stringify(history));

            // Reset and Close
            const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
            
            // Reset state
            currentCart = {};
            document.getElementById('customer-name').value = '';
            document.getElementById('table-select').value = '';
            document.getElementById('menu-search').value = ''; // Reset search
            
            toggleSummary();
            updateCartDisplay();
            renderMenu();
            renderHistory();

            // Fire and Forget WhatsApp
            window.open(waUrl, '_blank');
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            const search = document.getElementById('history-search').value.toLowerCase();
            container.innerHTML = '';

            const filteredHistory = history.filter(item => 
                item.kotId.toLowerCase().includes(search) || 
                item.table.toLowerCase().includes(search)
            );

            if (filteredHistory.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center">
                        <i class="fas fa-ghost text-slate-200 text-6xl mb-4"></i>
                        <p class="text-slate-400 font-bold">No history found</p>
                    </div>
                `;
                return;
            }

            filteredHistory.forEach((order, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl shadow-sm border border-slate-100";
                
                let itemsList = order.items.map(i => `<div class="flex justify-between py-1 border-b border-dashed border-slate-100">
                    <span class="text-slate-600">${i.name} × ${i.qty}</span>
                    <span class="font-semibold text-slate-800">₹${i.qty * i.price}</span>
                </div>`).join('');

                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="bg-indigo-50 text-indigo-600 text-[10px] font-black px-2 py-1 rounded-md uppercase mb-1 inline-block">${order.kotId}</span>
                            <h4 class="text-xl font-extrabold text-slate-800">${order.table}</h4>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-slate-400 font-medium">${order.timestamp}</p>
                            <p class="text-lg font-black text-indigo-600">₹${order.total}</p>
                        </div>
                    </div>
                    <div class="bg-slate-50/50 rounded-2xl p-3 text-sm mb-4">
                        ${itemsList}
                    </div>
                    <div class="flex gap-2">
                        <button onclick="reSendOrder(${idx})" class="flex-1 bg-slate-800 text-white py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2">
                            <i class="fab fa-whatsapp"></i> Re-send
                        </button>
                        <button onclick="deleteHistory(${idx})" class="w-12 h-12 bg-red-50 text-red-400 rounded-xl flex items-center justify-center">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function reSendOrder(index) {
            const order = history[index];
            let message = `*RESENT KOT No:* ${order.kotId}\n`;
            message += `*Table:* ${order.table}\n`;
            message += `*Customer:* ${order.customer}\n`;
            message += `----------------------------\n`;
            message += `*Items:*\n`;
            order.items.forEach(item => {
                message += `• ${item.name} x${item.qty}\n`;
            });
            message += `----------------------------\n`;
            message += `*Original Time:* ${order.timestamp}`;

            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function deleteHistory(index) {
            showSimpleConfirm("Delete Record?", "This will permanently remove this KOT from history.", "Delete", () => {
                history.splice(index, 1);
                localStorage.setItem(`${APP_ID}_history`, JSON.stringify(history));
                renderHistory();
                closeConfirm();
            });
        }

        function clearOrderConfirm() {
            showSimpleConfirm("Clear Order?", "This will remove all items from your current cart.", "Clear", () => {
                currentCart = {};
                updateCartDisplay();
                renderMenu();
                toggleSummary();
                closeConfirm();
            });
        }

        // --- UTILS ---

        function showSimpleAlert(title, msg, colorClass) {
            // Simplified for non-blocking UI
            const alertDiv = document.createElement('div');
            alertDiv.className = `fixed top-10 left-1/2 -translate-x-1/2 z-[100] ${colorClass} text-white px-6 py-4 rounded-2xl shadow-2xl font-bold animate-bounce`;
            alertDiv.innerText = msg;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 2500);
        }

        function showSimpleConfirm(title, msg, btnText, callback) {
            const modal = document.getElementById('confirm-modal');
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-msg').innerText = msg;
            const btn = document.getElementById('confirm-btn');
            btn.innerText = btnText;
            btn.onclick = callback;
            modal.classList.remove('hidden');
        }

        function closeConfirm() {
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        // Handle PWA and Scroll behaviors
        window.addEventListener('load', init);
        
        // Disable pinch zoom on iOS
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });

    </script>
</body>
</html>
